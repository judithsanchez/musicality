<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Salsa Rhythm Hub</title>
    <script>
      /**
       * GITHUB PAGES SPA ROUTING WORKAROUND
       * ─────────────────────────────────────────────────────────────────────
       * Problem:
       *   GitHub Pages is a static file server with no server-side routing.
       *   When a user visits or refreshes a deep URL like:
       *     https://judithsanchez.github.io/musicality/song/ABC123
       *   GitHub Pages looks for a file at that path, finds nothing, and
       *   serves THIS file (404.html) instead of index.html.
       *
       * This workaround (credit: rafgraph/spa-github-pages):
       *   1. This 404.html captures the intended pathname + search + hash.
       *   2. Encodes it as a query param (?p=...) on a redirect to the root.
       *   3. index.html has a matching script that decodes ?p= and calls
       *      history.replaceState() to restore the original URL before React
       *      mounts, so the router sees the correct path transparently.
       *
       * Long-term fix needed:
       *   This is a hack and has limitations (e.g. the redirect adds a flash,
       *   breaks prerendering/SEO). If hosting moves away from GitHub Pages to
       *   a platform that supports server-side rewrites (Vercel, Netlify,
       *   Cloudflare Pages, a custom server), this file and the corresponding
       *   script in index.html should be removed and replaced with a proper
       *   rewrite rule (e.g. Netlify's _redirects file: "/* /index.html 200").
       *
       * Tracked in: https://github.com/judithsanchez/musicality/issues/25
       * ─────────────────────────────────────────────────────────────────────
       */
      var base = '/musicality';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = base + '/?p=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
