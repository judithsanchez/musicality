name: Pre-Main Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pre-main-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, typecheck, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
